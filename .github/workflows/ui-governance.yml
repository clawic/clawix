name: UI governance

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  public-ui-governance:
    runs-on: ubuntu-latest
    env:
      CLAWIX_UI_GUARD_DIFF_BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Validate UI governance manifests
        run: node scripts/ui_governance_guard.mjs
      - name: Validate UI canon docs
        run: node scripts/ui_canon_docs_check.mjs
      - name: Validate UI canon promotion records
        run: node scripts/ui_canon_promotion_check.mjs
      - name: Validate UI decision verification
        run: node scripts/ui_decision_verification_check.mjs
      - name: Validate UI debt report
        run: node scripts/ui_debt_report_check.mjs
      - name: Validate UI debt audit manifest
        run: node scripts/ui_debt_audit_manifest_check.mjs
      - name: Validate UI critical cleanup queue
        run: node scripts/ui_critical_cleanup_queue_check.mjs
      - name: Validate UI exception registry
        run: node scripts/ui_exception_check.mjs
      - name: Validate UI inspiration references
        run: node scripts/ui_inspiration_reference_check.mjs
      - name: Validate UI protected surface contract
        run: node scripts/ui_protected_surface_check.mjs
      - name: Validate UI approval authority
        run: node scripts/ui_approval_authority_check.mjs
      - name: Validate UI canon units
        run: node scripts/ui_canon_unit_check.mjs
      - name: Validate UI geometry contracts
        run: node scripts/ui_geometry_contract_check.mjs
      - name: Validate UI completion audit
        run: node scripts/ui_completion_audit_check.mjs
      - name: Validate UI implementation evidence
        run: node scripts/ui_implementation_evidence_check.mjs
      - name: Validate UI implementation phases
        run: node scripts/ui_implementation_phase_check.mjs
      - name: Validate UI skill contracts
        run: node scripts/ui_skill_contract_check.mjs
      - name: Validate UI state coverage
        run: node scripts/ui_state_coverage_check.mjs
      - name: Validate UI surface references
        run: node scripts/ui_surface_reference_check.mjs
      - name: Validate UI surface baseline coverage
        run: node scripts/ui_surface_baseline_coverage_check.mjs
      - name: Validate UI rendered drift reports
        run: node scripts/ui_rendered_drift_check.mjs
      - name: Validate UI release gate wiring
        run: node scripts/ui_release_gate_check.mjs
      - name: Validate rendered geometry manifest
        run: node scripts/ui_rendered_geometry_manifest_check.mjs
      - name: Validate UI copy governance
        run: node scripts/ui_copy_governance_check.mjs
      - name: Validate UI performance budgets
        run: node scripts/ui_performance_budget_check.mjs
      - name: Validate UI pattern performance mapping
        run: node scripts/ui_pattern_performance_check.mjs
      - name: Validate UI pattern mutation guard
        run: node scripts/ui_pattern_mutation_guard.mjs
      - name: Validate UI component extraction governance
        run: node scripts/ui_component_extraction_check.mjs
      - name: Validate UI mechanical equivalence governance
        run: node scripts/ui_mechanical_equivalence_check.mjs
      - name: Validate UI visual scope policy
        run: node scripts/ui_visual_scope_check.mjs
      - name: Validate UI visual detector policy
        run: node scripts/ui_visual_detector_check.mjs
      - name: Validate UI visual model allowlist
        run: node scripts/ui_visual_model_allowlist_check.mjs
      - name: Validate UI visual guard failure
        run: node scripts/ui_visual_guard_failure_check.mjs
      - name: Validate UI visual proposals
        run: node scripts/ui_visual_proposal_check.mjs
      - name: Validate UI private artifact boundary
        run: node scripts/ui_private_artifact_boundary_check.mjs
      - name: Validate visible UI surface inventory
        run: node scripts/ui_surface_inventory_check.mjs
      - name: Validate private baseline manifest contract
        run: node scripts/ui_private_baseline_manifest_check.mjs
      - name: Validate private evidence plan contract
        run: node scripts/ui_private_evidence_plan_check.mjs
      - name: Validate private visual validation contract
        run: node scripts/ui_private_visual_validation_manifest_check.mjs
      - name: Validate documentation alignment
        run: bash scripts/doc_alignment_check.sh
