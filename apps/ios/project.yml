name: Clawix
options:
  deploymentTarget:
    iOS: "26.0"
  groupSortPosition: top
  generateEmptyDirectories: false
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.9"

configFiles:
  Debug: Clawix.xcconfig
  Release: Clawix.xcconfig

packages:
  ClawixCore:
    path: ../shared/ClawixCore

targets:
  Clawix:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources
    info:
      path: Sources/Clawix/Generated-Info.plist
      properties:
        CFBundleDisplayName: Clawix
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSApplicationCategoryType: public.app-category.developer-tools
        UILaunchScreen:
          UIBackgroundColor: LaunchBackground
        UIRequiresFullScreen: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIUserInterfaceStyle: Dark
        NSCameraUsageDescription: "Used to scan the Clawix pairing QR code shown on your Mac, and to capture photos to attach to your Codex prompts."
        NSPhotoLibraryUsageDescription: "Used to attach photos from your library to your Codex prompts."
        NSMicrophoneUsageDescription: "Used to record voice prompts and dictate messages to Codex."
        NSSpeechRecognitionUsageDescription: "Used to transcribe your voice messages on-device into editable text."
        NSLocalNetworkUsageDescription: "Used to talk to Clawix running on your Mac over the local network."
        NSBonjourServices:
          - _clawix-bridge._tcp
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        UIAppFonts:
          - PlusJakartaSans-Regular.ttf
          - PlusJakartaSans-Medium.ttf
          - PlusJakartaSans-SemiBold.ttf
          - PlusJakartaSans-Bold.ttf
          - Manrope.ttf
    settings:
      base:
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_PREVIEWS: YES
    dependencies:
      - package: ClawixCore
