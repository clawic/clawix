name: UI governance

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  public-ui-governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Validate UI governance manifests
        run: node scripts/ui_governance_guard.mjs
      - name: Validate UI canon promotion records
        run: node scripts/ui_canon_promotion_check.mjs
      - name: Validate UI debt report
        run: node scripts/ui_debt_report_check.mjs
      - name: Validate UI geometry contracts
        run: node scripts/ui_geometry_contract_check.mjs
      - name: Validate rendered geometry manifest
        run: node scripts/ui_rendered_geometry_manifest_check.mjs
      - name: Validate UI copy governance
        run: node scripts/ui_copy_governance_check.mjs
      - name: Validate UI component extraction governance
        run: node scripts/ui_component_extraction_check.mjs
      - name: Validate UI visual scope policy
        run: node scripts/ui_visual_scope_check.mjs
      - name: Validate UI visual detector policy
        run: node scripts/ui_visual_detector_check.mjs
      - name: Validate visible UI surface inventory
        run: node scripts/ui_surface_inventory_check.mjs
      - name: Validate private baseline manifest contract
        run: node scripts/ui_private_baseline_manifest_check.mjs
      - name: Validate documentation alignment
        run: bash scripts/doc_alignment_check.sh
